name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync project to VPS
        run: |
          rsync -av --delete ./ /opt/apps/certificateGenrater/

      - name: Build & Restart Docker
        run: |
          cd /opt/apps/certificateGenrater
          docker compose up -d --build

      - name: Remove old images
        run: docker image prune -f
